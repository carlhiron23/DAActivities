<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <linearGradient id="vinyl-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2a2a2a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1a1a;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="shine" cx="35%" cy="35%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0" />
    </radialGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="60" cy="60" r="58" fill="#f4e8d2" opacity="0.9"/>
  
  <!-- Vinyl record -->
  <circle cx="60" cy="60" r="42" fill="url(#vinyl-grad)" stroke="#3a3a3a" stroke-width="1"/>
  
  <!-- Vinyl grooves -->
  <circle cx="60" cy="60" r="38" fill="none" stroke="#4a4a4a" stroke-width="0.5" opacity="0.6"/>
  <circle cx="60" cy="60" r="33" fill="none" stroke="#4a4a4a" stroke-width="0.5" opacity="0.6"/>
  <circle cx="60" cy="60" r="28" fill="none" stroke="#4a4a4a" stroke-width="0.5" opacity="0.6"/>
  <circle cx="60" cy="60" r="23" fill="none" stroke="#4a4a4a" stroke-width="0.5" opacity="0.6"/>
  <circle cx="60" cy="60" r="18" fill="none" stroke="#4a4a4a" stroke-width="0.5" opacity="0.6"/>
  
  <!-- Center label -->
  <circle cx="60" cy="60" r="14" fill="#c28b47" stroke="#8a5c2b" stroke-width="1"/>
  <circle cx="60" cy="60" r="10" fill="#b35f3c" opacity="0.8"/>
  <circle cx="60" cy="60" r="6" fill="#6f7d4c"/>
  
  <!-- Shine effect on vinyl -->
  <circle cx="60" cy="60" r="42" fill="url(#shine)"/>
  
  <!-- Flower petals (top right) -->
  <g transform="translate(85, 40)">
    <!-- Petal 1 -->
    <ellipse cx="0" cy="-6" rx="3.5" ry="6" fill="#b4747a" opacity="0.85" transform="rotate(0)"/>
    <!-- Petal 2 -->
    <ellipse cx="5.2" cy="-3" rx="3.5" ry="6" fill="#c28b47" opacity="0.85" transform="rotate(72)"/>
    <!-- Petal 3 -->
    <ellipse cx="3.2" cy="4.8" rx="3.5" ry="6" fill="#b35f3c" opacity="0.85" transform="rotate(144)"/>
    <!-- Petal 4 -->
    <ellipse cx="-3.2" cy="4.8" rx="3.5" ry="6" fill="#6f7d4c" opacity="0.85" transform="rotate(216)"/>
    <!-- Petal 5 -->
    <ellipse cx="-5.2" cy="-3" rx="3.5" ry="6" fill="#b4747a" opacity="0.85" transform="rotate(288)"/>
    <!-- Center -->
    <circle cx="0" cy="0" r="2" fill="#d1c7a1"/>
  </g>
  
  <!-- Knitting needles (bottom left) -->
  <g transform="translate(32, 82)">
    <!-- Left needle -->
    <line x1="-8" y1="4" x2="2" y2="-8" stroke="#c28b47" stroke-width="1.5" stroke-linecap="round"/>
    <circle cx="-8" cy="4" r="1.8" fill="#b35f3c"/>
    <!-- Right needle -->
    <line x1="8" y1="4" x2="-2" y2="-8" stroke="#6f7d4c" stroke-width="1.5" stroke-linecap="round"/>
    <circle cx="8" cy="4" r="1.8" fill="#6f7d4c"/>
    <!-- Thread loops -->
    <path d="M 0 -2 Q -3 0 0 2 Q 3 0 0 -2" fill="none" stroke="#d1c7a1" stroke-width="1.2" opacity="0.9"/>
  </g>
  
  <!-- Teacup (bottom right) -->
  <g transform="translate(88, 84)">
    <!-- Cup body -->
    <path d="M -5 0 Q -6 3 -3 5 L 3 5 Q 6 3 5 0 Z" fill="#d1c7a1" stroke="#b35f3c" stroke-width="1"/>
    <!-- Handle -->
    <path d="M 5 1 Q 9 1 9 3 Q 9 5 5 5" fill="none" stroke="#b35f3c" stroke-width="1.2" stroke-linecap="round"/>
    <!-- Steam wisp -->
    <path d="M -2 -2 Q -3 -5 -1 -6" fill="none" stroke="#c28b47" stroke-width="0.8" opacity="0.6" stroke-linecap="round"/>
  </g>
  
  <!-- Border circle -->
  <circle cx="60" cy="60" r="58" fill="none" stroke="#b35f3c" stroke-width="1.5" opacity="0.6"/>
</svg>
